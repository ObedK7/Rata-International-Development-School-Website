<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./admission.css">
</head>

<body>
    <section class="container-form">
        <header class="registration">Registration Form</header>
        <form action="#" class="form">
            <div class="input-box">
                <label>Child's Name</label>
                <input type="text" placeholder="Enter child's full name" required>
            </div>
            <div class="input-box">
                <label>Place Of Birth</label>
                <input type="text" placeholder="Enter place of birth" required>
            </div>
            <div class="input-box">
                <label>Home Town</label>
                <input type="text" placeholder="Enter home town" required>
            </div>
            <div class="input-box addres">
                <label>Mother's Tongue</label>
                <input type="text" placeholder="Enter place of birth" required>
            </div>
            <div class="select-box">
                <select name="class" id="class">
                    <option hidden>Class Admitted</option>
                    <option value="creche">Creche/Nursery</option>
                    <option value="kg-1">Kindergarten 1</option>
                    <option value="kg-2">Kindergarten 2</option>
                    <option value="b-1">Basic 1</option>
                    <option value="b-2">Basic 2</option>
                    <option value="b-3">Basic 3</option>
                    <option value="b-4">Basic 4</option>
                    <option value="b-5">Basic 5</option>
                    <option value="b-6">Basic 6</option>
                    <option value="b-7">Basic 7</option>
                    <option value="b-8">Basic 8</option>
                </select>
            </div>
            </div>
            <div class="parent-box">
                <h3>Child Lives With</h3>
                <div class="parent-option">
                    <div class="parent">
                        <input type="radio" id="check-father" name="radio">
                        <label for="check-father">Father</label>
                    </div>
                    <div class="parent">
                        <input type="radio" id="check-mother" name="radio">
                        <label for="check-mother">Mother</label>
                    </div>
                    <div class="parent">
                        <input type="radio" id="check-both-parent's" name="radio">
                        <label for="check-both-parent's">Both</label>
                    </div>
                    <div class="parent">
                        <input type="radio" id="check-guardian" name="radio">
                        <label for="check-guardian">Guardian</label>
                    </div>
                </div>
            </div>

            <div class="gender-box">
                <h3>Gender</h3>
                <div class="gender-option">
                    <div class="gender">
                        <input type="radio" id="check-male" name="gender">
                        <label for="check-male">Male</label>
                    </div>
                    <div class="gender">
                        <input type="radio" id="check-female" name="gender">
                        <label for="check-female">Female</label>
                    </div>
                    <div class="gender">
                        <input type="radio" id="check-preferred" name="gender">
                        <label for="check-preferred">Prefer not to say</label>
                    </div>
                </div>
            </div>
            <div class="family-name">
                <div class="mother-data">
                    <div class="input-box">
                        <h3>Mother's Details</h3>
                        <label>Mother's Full Name</label>
                        <input type="text" placeholder="Enter mother's full name" required>
                    </div>
                    <div class="input-box">
                        <label>Address</label>
                        <input type="text" placeholder="Enter address" required>
                    </div>
                    <div class="input-box">
                        <label>Contact</label>
                        <input type="text" placeholder="Enter contact" required>
                    </div>
                    <div class="father-data">
                        <h3>Father's Details</h3>
                        <div class="input-box">
                            <label>Father's Full Name</label>
                            <input type="text" placeholder="Enter father's full name" required>
                        </div>
                        <div class="input-box">
                            <label>Address</label>
                            <input type="text" placeholder="Enter address" required>
                        </div>
                        <div class="input-box">
                            <label>Contact</label>
                            <input type="text" placeholder="Enter contact" required>
                        </div>
                        <div class="guardian-data">
                            <h3>Guardian's Details</h3>
                            <div class="input-box">
                                <label>Guardians Full Name</label>
                                <input type="text" placeholder="Enter guardians full name" required>
                            </div>
                            <div class="input-box">
                                <label>Address</label>
                                <input type="text" placeholder="Enter address" required>
                            </div>
                            <div class="input-box">
                                <label>Contact</label>
                                <input type="text" placeholder="Enter contact" required>
                            </div>
                            <div class="both-data">
                                <h3>Both Parent's Details</h3>
                                <div class="input-box">
                                    <label>Mother's Full Name</label>
                                    <input type="text" placeholder="Enter mother's full name" required>
                                </div>
                                <div class="input-box">
                                    <label>Address</label>
                                    <input type="text" placeholder="Enter address" required>
                                </div>
                                <div class="input-box">
                                    <label>Contact</label>
                                    <input type="text" placeholder="Enter Contact" required>
                                </div>
                                <div class="input-box">
                                    <label>Father's Full Name</label>
                                    <input type="text" placeholder="Enter father's full name" required>
                                </div>
                                <div class="input-box">
                                    <label>Address</label>
                                    <input type="text" placeholder="Enter address" required>
                                </div>
                                <div class="input-box">
                                    <label>Contact</label>
                                    <input type="text" placeholder="Enter contact" required>
                                </div>
                            </div>
                        </div>
                        <button>Submit</button>
                    </div>
                </div>
            </div>
        </form>
    </section>
</body>

</html>
